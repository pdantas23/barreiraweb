# Nginx do Barreira web (Vite SPA) + reverse proxy pro server Node.
#
# Local no VPS:  /etc/nginx/sites-available/barreira
# Habilita com:  ln -s /etc/nginx/sites-available/barreira /etc/nginx/sites-enabled/
#
# Pre-requisito: rodar `npm install && npm run build` em /var/www/barreira/web
# pra gerar /var/www/barreira/web/dist/ (a build estatica que o nginx serve).
#
# O certbot vai EDITAR ESSE ARQUIVO quando gerar o TLS — vai injetar as
# linhas de SSL + redirect 80->443. Nao edite manualmente depois disso,
# so rode `certbot renew` ou `certbot --nginx -d ...` que ele cuida.

server {
    listen 80;
    listen [::]:80;
    # Aceita 2 dominios em paralelo:
    # - 129-121-52-119.sslip.io (legacy, transicao)
    # - barreirajogo.com e www.barreirajogo.com (definitivo)
    server_name 129-121-52-119.sslip.io barreirajogo.com www.barreirajogo.com;

    # Health do nginx (nao bate no Node) — util pra check rapido.
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
    }

    # Paginas estaticas pre-renderizadas, servidas direto do disco em
    # /var/www/barreira/deploy/public. URLs sem extensao .html.
    # - /privacy + /suporte: legacy + App Store compliance (Apple exige URL
    #   HTTPS publica pra Privacy Policy no App Store Connect).
    # - /regras, /estrategias, /sobre: prerender SEO/AdSense — o crawler
    #   recebe o conteudo direto no HTML, sem precisar executar JS.
    # NOTA: tem prioridade sobre a SPA — direct hit em /regras serve aqui,
    # nao o componente React Regras.tsx (navegacao intra-app via React
    # Router continua funcionando porque nao recarrega a pagina).
    location = /privacy {
        root /var/www/barreira/deploy/public;
        try_files /privacy.html =404;
        default_type text/html;
    }
    location = /suporte {
        root /var/www/barreira/deploy/public;
        try_files /suporte.html =404;
        default_type text/html;
    }
    location = /regras {
        root /var/www/barreira/deploy/public;
        try_files /regras.html =404;
        default_type text/html;
    }
    location = /estrategias {
        root /var/www/barreira/deploy/public;
        try_files /estrategias.html =404;
        default_type text/html;
    }
    location = /sobre {
        root /var/www/barreira/deploy/public;
        try_files /sobre.html =404;
        default_type text/html;
    }
    location = /termos {
        root /var/www/barreira/deploy/public;
        try_files /termos.html =404;
        default_type text/html;
    }
    # Seção de artigos/guias (SEO/AdSense). O índice em /artigos e cada
    # artigo em /artigos/<slug> (sem .html na URL). A regex casa o slug e
    # serve o HTML estático correspondente; precisa vir ANTES do fallback
    # da SPA. Slugs só com [a-z0-9-] (os arquivos em deploy/public/artigos/).
    location = /artigos {
        root /var/www/barreira/deploy/public;
        try_files /artigos/index.html =404;
        default_type text/html;
    }
    location ~ ^/artigos/([a-z0-9-]+)/?$ {
        root /var/www/barreira/deploy/public;
        try_files /artigos/$1.html =404;
        default_type text/html;
    }

    # === Universal Links (iOS) / App Links (Android) ===
    # Servidos do disco como JSON, via HTTPS, sem redirect — exigencia do SO
    # pra abrir o app direto nos links https://barreirajogo.com/sala/CODE.
    # Precisam vir ANTES do fallback da SPA (senao `location /` devolve o
    # index.html). O AASA do iOS nao tem extensao .json de proposito.
    location = /.well-known/apple-app-site-association {
        root /var/www/barreira/deploy/public;
        try_files /.well-known/apple-app-site-association =404;
        default_type application/json;
        add_header Cache-Control "no-cache";
    }
    location = /.well-known/assetlinks.json {
        root /var/www/barreira/deploy/public;
        try_files /.well-known/assetlinks.json =404;
        default_type application/json;
        add_header Cache-Control "no-cache";
    }

    # === Backend Node (Express + Socket.IO) ===
    # /health: endpoint de healthcheck do server.
    # /socket.io/: handshake + upgrade WebSocket.
    # Ambos precisam dos headers de Upgrade pra WS funcionar.
    location = /health {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # /admin/live: estado ao vivo (salas/fila/eventos) pro dashboard de
    # analytics. Rota do node — precisa vir ANTES do fallback da SPA, senao
    # `location /` devolve o index.html. (/admin/stats SEM location = SPA.)
    location = /admin/live {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Headers obrigatorios pra WebSocket (socket.io upgrade do HTTP).
        # SEM isso, o cliente conecta mas a conexao cai em ~30s.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # IP real do cliente pro server logar quem e quem.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts longos — partida pode ficar idle entre jogadas.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Buffers desligados pra WS: queremos as mensagens passando na hora.
        proxy_buffering off;
    }

    # === SPA (Vite build) ===
    # Cache forte pros assets imutaveis (hash no nome). Vite gera bundles
    # tipo `index-DEADBEEF.js` que nao mudam de conteudo entre deploys.
    location ~* \.(?:js|mjs|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico|mp3|wav|ogg)$ {
        root /var/www/barreira/web/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # SPA fallback: qualquer rota nao-arquivo cai no index.html, e o React
    # Router resolve client-side. Isso e o que conserta o 404 do AdSense em
    # /regras, /estrategias, /sobre, /login, /cadastro, /termos, /perfil.
    location / {
        root /var/www/barreira/web/dist;
        try_files $uri $uri/ /index.html;

        # index.html sempre fresco — sem cache na shell do app.
        # Os assets dentro do html sao hashados e cacheaveis (regex acima).
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
