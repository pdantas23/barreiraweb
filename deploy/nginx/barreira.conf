# Reverse proxy do nginx pro Barreira server.
#
# Local no VPS:  /etc/nginx/sites-available/barreira
# Habilita com:  ln -s /etc/nginx/sites-available/barreira /etc/nginx/sites-enabled/
#
# O certbot vai EDITAR ESSE ARQUIVO quando gerar o TLS — vai injetar as
# linhas de SSL + redirect 80→443. Não edite manualmente depois disso,
# só rode `certbot renew` ou `certbot --nginx -d ...` que ele cuida.

server {
    listen 80;
    listen [::]:80;
    # Aceita 2 domínios em paralelo:
    # - 129-121-52-119.sslip.io (legacy, transição)
    # - barreirajogo.com e www.barreirajogo.com (definitivo)
    server_name 129-121-52-119.sslip.io barreirajogo.com www.barreirajogo.com;

    # Health do nginx (não bate no Node) — útil pra check rápido.
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
    }

    # Tudo o que não é nginx-health vai pro Node na 3001.
    # (3001 e não 3000 pra coexistir com o myfollowers, que já usa 3000.)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Headers obrigatórios pra WebSocket (socket.io upgrade do HTTP).
        # SEM isso, o cliente conecta mas a conexão cai em ~30s.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # IP real do cliente pro server logar quem é quem.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts longos — partida pode ficar idle entre jogadas.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Buffers desligados pra WS: queremos as mensagens passando na hora.
        proxy_buffering off;
    }
}
